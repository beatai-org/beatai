<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 辣评 README 预览</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #eef3f7;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-strong: #ffffff;
        --text: #102030;
        --muted: #5c6b79;
        --border: rgba(16, 32, 48, 0.12);
        --accent: #0b7adf;
        --accent-soft: rgba(11, 122, 223, 0.12);
        --shadow: 0 24px 60px rgba(30, 56, 84, 0.12);
        --code-bg: #0f1720;
        --code-text: #d7e5f6;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1118;
          --panel: rgba(18, 26, 36, 0.88);
          --panel-strong: #111923;
          --text: #e6eef7;
          --muted: #91a3b5;
          --border: rgba(157, 183, 212, 0.14);
          --accent: #5db1ff;
          --accent-soft: rgba(93, 177, 255, 0.14);
          --shadow: 0 28px 72px rgba(0, 0, 0, 0.34);
          --code-bg: #081018;
          --code-text: #dce9f8;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(11, 122, 223, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(64, 176, 255, 0.12), transparent 24%),
          linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 82%, black 18%));
      }

      .page {
        max-width: 1440px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero {
        display: grid;
        gap: 18px;
        margin-bottom: 24px;
      }

      .hero-card {
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: linear-gradient(180deg, var(--panel), color-mix(in srgb, var(--panel-strong) 86%, transparent));
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(30px, 5vw, 54px);
        line-height: 1.02;
      }

      .lead {
        margin: 0;
        max-width: 840px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .meta-item {
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: color-mix(in srgb, var(--panel-strong) 82%, transparent);
        font-size: 13px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.95fr);
        gap: 20px;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: linear-gradient(180deg, var(--panel), color-mix(in srgb, var(--panel-strong) 90%, transparent));
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }

      .panel-title {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .panel-subtitle {
        color: var(--muted);
        font-size: 13px;
      }

      .rendered {
        padding: 28px;
      }

      .rendered h1 {
        margin: 0 0 20px;
        font-size: 32px;
        line-height: 1.08;
      }

      .rendered h4 {
        margin: 28px 0 12px;
        font-size: 18px;
        line-height: 1.25;
      }

      .rendered ul {
        margin: 0;
        padding-left: 20px;
      }

      .rendered li {
        margin: 10px 0;
        line-height: 1.7;
      }

      .rendered a {
        color: var(--accent);
        text-decoration: none;
      }

      .rendered a:hover {
        text-decoration: underline;
      }

      .source {
        margin: 0;
        padding: 22px 24px 28px;
        background: var(--code-bg);
        color: var(--code-text);
        font-family: "SFMono-Regular", "JetBrains Mono", "Consolas", monospace;
        font-size: 13px;
        line-height: 1.7;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .error {
        margin: 0;
        padding: 20px 24px 28px;
        color: #ff7a7a;
        font-family: "SFMono-Regular", "JetBrains Mono", monospace;
        white-space: pre-wrap;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .page {
          padding: 18px 14px 28px;
        }

        .hero-card,
        .rendered,
        .source {
          padding-left: 18px;
          padding-right: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <div class="hero-card">
          <div class="eyebrow">TEMP PREVIEW</div>
          <h1>AI 辣评 README 渲染预览</h1>
          <p class="lead">
            这个页面直接读取 <code>/docs/ai-insights/_meta.json</code>，按新 SKILL 的规则生成完整 markdown。
            左侧是最终渲染效果，右侧是原始 markdown 文本，方便你确认 README 输出是否符合预期。
          </p>
          <div class="meta" id="meta">
            <div class="meta-item">读取中...</div>
          </div>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <header class="panel-header">
            <div>
              <h2 class="panel-title">渲染后效果</h2>
              <div class="panel-subtitle">标题、月份分组、文章链接</div>
            </div>
          </header>
          <div class="rendered" id="rendered">加载中...</div>
        </article>

        <article class="panel">
          <header class="panel-header">
            <div>
              <h2 class="panel-title">原始 Markdown</h2>
              <div class="panel-subtitle">完整 README 内容</div>
            </div>
          </header>
          <pre class="source" id="source">加载中...</pre>
        </article>
      </section>
    </div>

    <script>
      const TITLE = 'BeatAI - AI辣评';
      const BASE_URL = 'https://beatai.org';
      const YEAR_MONTH_WITH_SPACES_RE = /^\s*(\d{4})\s*年\s*(\d{1,2})\s*月\s*$/;
      const YEAR_MONTH_DAY_DASH_RE = /^\s*(\d{4})-(\d{1,2})-(\d{1,2})\s*$/;
      const YEAR_MONTH_DASH_RE = /^\s*(\d{4})-(\d{1,2})\s*$/;

      function escapeHtml(value) {
        return value
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function joinUrl(baseUrl, path) {
        const normalizedPath = path.startsWith('/') ? path : `/${path}`;
        return `${baseUrl.replace(/\/$/, '')}${normalizedPath}`;
      }

      function sectionSortKey(section) {
        const title = typeof section?.title === 'string' ? section.title : '';
        let match = title.match(YEAR_MONTH_WITH_SPACES_RE);
        if (match) {
          return [Number(match[1]), Number(match[2]), 0, title];
        }

        match = title.match(YEAR_MONTH_DAY_DASH_RE);
        if (match) {
          return [Number(match[1]), Number(match[2]), Number(match[3]), title];
        }

        match = title.match(YEAR_MONTH_DASH_RE);
        if (match) {
          return [Number(match[1]), Number(match[2]), 0, title];
        }

        return [0, 0, 0, title];
      }

      function compareSectionDesc(left, right) {
        const leftKey = sectionSortKey(left);
        const rightKey = sectionSortKey(right);

        for (let index = 0; index < leftKey.length; index += 1) {
          if (leftKey[index] === rightKey[index]) {
            continue;
          }

          if (typeof leftKey[index] === 'number' && typeof rightKey[index] === 'number') {
            return rightKey[index] - leftKey[index];
          }

          return String(rightKey[index]).localeCompare(String(leftKey[index]), 'zh-CN');
        }

        return 0;
      }

      function renderMarkdown(meta) {
        const lines = [
          `<p align="center">`,
          `  <img src="https://beatai.org/beatai-logo-classic-blue.png" alt="BeatAI" width="88" />`,
          `</p>`,
          ``,
          `<h1 align="center">BeatAI - AI辣评</h1>`,
          ``,
          `<p align="center">`,
          `  <img src="https://img.shields.io/badge/BeatAI-Daily%20AI%20Signal-0B7ADF?style=for-the-badge&labelColor=0F172A" alt="BeatAI Daily AI Signal" />`,
          `  <img src="https://img.shields.io/badge/Focus-Agent%20%7C%20LLM%20%7C%20AI%20Coding-111827?style=for-the-badge&logoColor=white" alt="Focus Agent LLM AI Coding" />`,
          `</p>`,
          ``,
          `<p align="center">`,
          `  <a href="https://beatai.org/ai-insights">`,
          `    <img src="https://img.shields.io/badge/Open%20on-beatai.org-1D9BF0?style=flat-square&labelColor=0B1320" alt="Open on beatai.org" />`,
          `  </a>`,
          `  <a href="https://github.com/beatai-org/BeatAI">`,
          `    <img src="https://img.shields.io/badge/Repo-BeatAI-0F172A?style=flat-square&logo=github" alt="BeatAI Repo" />`,
          `  </a>`,
          `</p>`
        ];
        const sections = [...(meta.sections || [])].sort(compareSectionDesc);

        for (const section of sections) {
          lines.push('', `#### ${section.title}`);
          for (const item of section.items || []) {
            lines.push(`- [${item.title}](${joinUrl(BASE_URL, item.path)})`);
          }
        }

        return `${lines.join('\n')}\n`;
      }

      function markdownToHtml(markdown) {
        const lines = markdown.split('\n');
        const html = [];
        let inList = false;
        let index = 0;

        const closeList = () => {
          if (inList) {
            html.push('</ul>');
            inList = false;
          }
        };

        while (index < lines.length) {
          const line = lines[index];
          const trimmed = line.trim();

          if (!trimmed) {
            closeList();
            index += 1;
            continue;
          }

          if (trimmed.startsWith('<')) {
            closeList();
            const block = [line];
            index += 1;

            while (index < lines.length && lines[index].trim()) {
              block.push(lines[index]);
              index += 1;
            }

            html.push(block.join('\n'));
            continue;
          }

          if (line.startsWith('# ')) {
            closeList();
            html.push(`<h1>${escapeHtml(line.slice(2))}</h1>`);
            index += 1;
            continue;
          }

          if (line.startsWith('#### ')) {
            closeList();
            html.push(`<h4>${escapeHtml(line.slice(5))}</h4>`);
            index += 1;
            continue;
          }

          const itemMatch = line.match(/^- \[(.+)\]\((.+)\)$/);
          if (itemMatch) {
            if (!inList) {
              html.push('<ul>');
              inList = true;
            }
            const [, text, href] = itemMatch;
            html.push(
              `<li><a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(text)}</a></li>`
            );
            index += 1;
            continue;
          }

          index += 1;
        }

        closeList();
        return html.join('');
      }

      function updateMeta(meta) {
        const sections = meta.sections || [];
        const articleCount = sections.reduce((count, section) => count + (section.items || []).length, 0);
        const metaRoot = document.getElementById('meta');
        metaRoot.innerHTML = [
          `<div class="meta-item">章节分组 ${sections.length}</div>`,
          `<div class="meta-item">文章总数 ${articleCount}</div>`,
          `<div class="meta-item">数据源 /docs/ai-insights/_meta.json</div>`,
          `<div class="meta-item">输出标题 ${TITLE}</div>`
        ].join('');
      }

      async function main() {
        const rendered = document.getElementById('rendered');
        const source = document.getElementById('source');

        try {
          const response = await fetch('/docs/ai-insights/_meta.json', { cache: 'no-store' });
          if (!response.ok) {
            throw new Error(`Failed to load _meta.json: ${response.status}`);
          }

          const meta = await response.json();
          const markdown = renderMarkdown(meta);

          updateMeta(meta);
          rendered.innerHTML = markdownToHtml(markdown);
          source.textContent = markdown;
        } catch (error) {
          rendered.innerHTML = `<pre class="error">${escapeHtml(String(error))}</pre>`;
          source.textContent = String(error);
        }
      }

      main();
    </script>
  </body>
</html>
