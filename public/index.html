<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      data-page-seo="true"
      content="BeatAI - The AI that actually does things"
    />
    <link rel="apple-touch-icon" href="./logo192.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>BeatAI - The AI that actually does things</title>

    <!-- DNS 预连接 - 提升字体加载性能 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Web 字体 CDN 引用 -->
    <!-- 思源系列 (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- 霞鹜文楷 (jsDelivr) -->
    <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">

    <!-- 站酷系列 (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

    <!-- 马善政楷书 (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&display=swap" rel="stylesheet">

    <!-- Theme migration script - runs before React loads -->
    <script src="./clear-old-theme.js"></script>
  </head>
  <body>
    <!-- Single Page Apps for GitHub Pages - Redirect restoration -->
    <!-- https://github.com/rafgraph/spa-github-pages -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('githubPagesRedirect');
        sessionStorage.removeItem('githubPagesRedirect');

        if (redirect && redirect !== window.location.pathname) {
          // Use replaceState to update the URL without triggering a page load
          history.replaceState(null, null, redirect);
        }
      })();
    </script>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
